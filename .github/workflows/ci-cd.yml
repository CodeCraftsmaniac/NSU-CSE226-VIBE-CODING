name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'Project 3 (CLI, Flutter App, WebApp)/**'
  pull_request:
    branches: [main]
    paths:
      - 'Project 3 (CLI, Flutter App, WebApp)/**'
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Test & Lint
  # ═══════════════════════════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 'Project 3 (CLI, Flutter App, WebApp)'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings only for now
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test Imports
        run: |
          python -c "from src.core import run_full_analysis; print('✅ core.py imports OK')"
          python -c "from src.ocr_web import WebOCR; print('✅ ocr_web.py imports OK')"
          python -c "from backend.api import app; print('✅ backend/api.py imports OK')"

  # ═══════════════════════════════════════════════════════════════
  # Deploy Frontend - Note: Vercel auto-deploys via GitHub integration
  # ═══════════════════════════════════════════════════════════════
  deploy-frontend:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Frontend Deployment Info
        run: |
          echo "✅ Vercel auto-deploys via GitHub integration"
          echo "🌐 Frontend: https://ocr.nsunexus.app"

  # ═══════════════════════════════════════════════════════════════
  # Deploy Backend (only on main push)
  # ═══════════════════════════════════════════════════════════════
  deploy-backend:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 'Project 3 (CLI, Flutter App, WebApp)'
    
    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: galvanic-deck-478816-u9
      SERVICE: cse226-ocr-p2-nsunexus-backend-cli-web-app
      REGION: us-central1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --source . \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --set-env-vars "GOOGLE_CLOUD_VISION_KEY=${{ secrets.GOOGLE_CLOUD_VISION_KEY }},OCR_SPACE_API_KEY=${{ secrets.OCR_SPACE_API_KEY }},FLASK_ENV=production"

  # ═══════════════════════════════════════════════════════════════
  # Summary
  # ═══════════════════════════════════════════════════════════════
  summary:
    needs: [deploy-frontend, deploy-backend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Summary
        run: |
          echo "═══════════════════════════════════════════════"
          echo "  NSU Degree Audit - Deployment Complete"
          echo "═══════════════════════════════════════════════"
          echo ""
          echo "🌐 Frontend: https://ocr.nsunexus.app"
          echo "🔧 Backend:  https://ocrapi.nsunexus.app"
          echo ""
          echo "═══════════════════════════════════════════════"
