name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'Project 3 (CLI, Flutter App, WebApp)/backend/**'
      - 'Project 3 (CLI, Flutter App, WebApp)/src/**'
      - 'Project 3 (CLI, Flutter App, WebApp)/Dockerfile'
      - 'Project 3 (CLI, Flutter App, WebApp)/requirements.txt'
  workflow_dispatch:

env:
  PROJECT_ID: galvanic-deck-478816-u9
  SERVICE: cse226-ocr-p2-nsunexus-backend-cli-web-app
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 'Project 3 (CLI, Flutter App, WebApp)'
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to Cloud Run (source-based)
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --source . \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --set-env-vars "GOOGLE_CLOUD_VISION_KEY=${{ secrets.GOOGLE_CLOUD_VISION_KEY }},OCR_SPACE_API_KEY=${{ secrets.OCR_SPACE_API_KEY }},FLASK_ENV=production,LOG_LEVEL=INFO" \
            --quiet

      - name: Deployment Summary
        run: |
          echo "✅ Backend deployed to Cloud Run"
          echo "🌐 URL: https://ocrapi.nsunexus.app"
